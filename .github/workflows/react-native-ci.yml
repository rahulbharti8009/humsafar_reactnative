permissions:
  contents: write
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Lint
        run: npm run lint || true

      - name: Run Tests
        run: npm test || true
    
  android-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
     
      - name: Debug Secrets
        run: |
          echo "User: ${{ secrets.EMAILUSER }}"
          echo "User var: ${{ vars.EMAILUSER }}"
          echo "Pass length: ${#GOOGLEPASSKEY}"
        env:
          GOOGLEPASSKEY: ${{ secrets.GOOGLEPASSKEY }}

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      #✅ Upload to Release (NEW)
      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: APK Build v${{ github.run_number }}
          files: android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ✅ ADD EMAIL STEP HERE 
      - name: Send Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com          
          server_port: 587
          secure: false
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.GOOGLEPASSKEY }}
          subject: "APK Build Success 🚀"
          body: |
            Hello,

            ✅ Your APK build has been completed successfully.

            📦 Download your APK from the link below:
            https://github.com/${{ github.repository }}/releases/download/v${{ github.run_number }}/app-debug.apk

            🔍 Build Details:
            - Repository: ${{ github.repository }}
            - Branch: ${{ github.ref_name }}
            - Commit: ${{ github.sha }}
            - Triggered by: ${{ github.actor }}

            Thanks,
            GitHub Actions 🤖

          to: lovelybharti9292@gmail.com
          from: GitHub Actions